<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOREX MASTER | Official Community</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background: #020617;
            color: white; 
            overflow-x: hidden;
            overflow-y: auto; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .bg-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        .premium-card {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(59, 130, 246, 0.2);
            width: 92%;
            max-width: 420px;
            padding: 2.5rem 2rem;
            border-radius: 2.5rem;
            margin: 20px auto;
            position: relative;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        }

        /* Progress Bar Animation (10 Seconds) */
        .loader-progress {
            width: 0%;
            height: 100%;
            background: #3b82f6;
            transition: width 10s linear; /* Match 10s countdown */
        }

        .shimmer-btn {
            background: linear-gradient(90deg, #2563eb, #3b82f6, #2563eb);
            background-size: 200% auto;
            animation: shine 3s linear infinite;
        }
        @keyframes shine {
            to { background-position: 200% center; }
        }

        .avatar-ring {
            position: absolute;
            inset: -4px;
            border: 2px solid #3b82f6;
            border-radius: 50%;
            animation: ringPulse 2s infinite;
        }
        @keyframes ringPulse {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.15); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <div class="premium-card text-center">
        <div class="inline-flex items-center gap-2 bg-green-500/10 border border-green-500/20 px-4 py-1.5 rounded-full mb-6">
            <span class="h-2 w-2 rounded-full bg-green-500 animate-pulse"></span>
            <span class="text-[10px] font-bold tracking-[0.1em] text-green-400 uppercase">14,284 Members Online</span>
        </div>

        <div class="relative inline-block mb-4">
            <div class="avatar-ring"></div>
            <img src="https://i.ibb.co/7NNWnx36/Whats-App-Image-2026-03-09-at-4-05-59-PM.jpg" 
                 alt="Forex Master" 
                 class="w-24 h-24 rounded-full border-4 border-slate-900 object-cover relative z-10">
        </div>

        <h1 class="text-3xl font-bold mb-1">FOREX MASTER</h1>
        <p class="text-blue-500 text-[10px] font-bold uppercase tracking-[0.3em] mb-8 text-center">Premium Network</p>

        <div class="space-y-3 mb-8">
            <div class="flex items-center gap-3 bg-white/5 p-3 rounded-2xl border border-white/5">
                <i class="fas fa-check-circle text-blue-500"></i>
                <span class="text-xs font-semibold">
JOIN OUR COMMUNITY FOR TRADING RELATED TIPS AND DISCUSSION</span>
            </div>
            <div class="flex items-center gap-3 bg-white/5 p-3 rounded-2xl border border-white/5">
                <i class="fas fa-bolt text-yellow-500"></i>
                <span class="text-xs font-semibold">SUBSCRIBE NOW AND BECOME A MEMBER TO OUR FAMILY! 💬</span>
            </div>
        </div>

        <div class="mb-8 bg-black/20 p-4 rounded-3xl border border-white/5">
            <div class="flex justify-between items-center mb-2">
                <p id="status-text" class="text-[10px] text-blue-300 font-bold uppercase tracking-wider">Secure Handshake...</p>
                <div class="text-3xl font-black italic text-white/90" id="countdown">10</div>
            </div>
            <div class="w-full h-1.5 bg-white/10 rounded-full overflow-hidden">
                <div id="progress-bar" class="loader-progress"></div>
            </div>
        </div>

        <a href="https://t.me/+vfYmJOdWqsFlNzk0" 
           class="shimmer-btn block w-full py-4 rounded-2xl text-white font-bold text-lg transition-all active:scale-95 flex items-center justify-center gap-3">
            <i class="fab fa-telegram-plane text-2xl"></i>
            JOIN COMMUNITY
        </a>

        <div class="mt-8 pt-4 border-t border-white/5 flex flex-col items-center gap-1 opacity-50">
            <p class="text-[8px] uppercase tracking-[0.2em]">Authentication Gateway</p>
            <p class="text-[10px] font-bold text-blue-400">DESIGN BY OM</p>
        </div>
    </div>

    <script>
        let timeLeft = 10;
        const countdownElement = document.getElementById('countdown');
        const progressBar = document.getElementById('progress-bar');
        const statusText = document.getElementById('status-text');
        const targetURL = "https://t.me/+vfYmJOdWqsFlNzk0";

        // Start progress bar 
        setTimeout(() => { if(progressBar) progressBar.style.width = "100%"; }, 100);

        const timer = setInterval(() => {
            timeLeft--;
            if(countdownElement) countdownElement.textContent = timeLeft;

            // Change status text based on time
            if(timeLeft == 8) statusText.textContent = "Bypassing Encryptions...";
            if(timeLeft == 6) statusText.textContent = "Verifying VIP Token...";
            if(timeLeft == 4) statusText.textContent = "Syncing Signals...";
            if(timeLeft == 2) statusText.textContent = "Connection Stable...";
            if(timeLeft == 1) statusText.textContent = "Redirecting Now!";

            if (timeLeft <= 0) {
                clearInterval(timer);
                
                // Confetti celebration
                confetti({
                    particleCount: 150,
                    spread: 80,
                    origin: { y: 0.8 },
                    colors: ['#2563eb', '#ffffff', '#60a5fa']
                });

                setTimeout(() => {
                    window.location.href = targetURL;
                }, 900);
            }
        }, 1000);
    </script>
</body>
</html>
